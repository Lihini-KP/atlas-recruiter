<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Candidate Assessment — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>Candidate Assessment</h1>
    <p>Assessment submissions grouped by position, with a quick summary per group.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<style>
  .group-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; cursor: pointer; background: var(--panel);
  }
  .group-card:hover { border-color: var(--accent); }
  .group-card .count { font-size: 13px; color: var(--muted); }
  .bar-row { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .bar-track { height: 10px; border-radius: 999px; background: var(--bg); overflow: hidden; display: flex; }
  .bar-fill { height: 100%; }
  .bar-fill.yes { background: var(--accent); }
  .bar-fill.no { background: var(--muted); }
  .candidate-row { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .candidate-row:last-child { border-bottom: none; }
  .candidate-row .name { font-weight: 600; }
  .candidate-row .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
</style>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script>
const main = document.getElementById('main-content');
let allAssessments = [];

function groupKeyFor(candidate) {
  const r = candidate.recruitment_requests;
  if (r) return `${r.companies?.name || '—'} / ${r.designation}`;
  return `Unassigned — ${candidate.source_subject || candidate.full_name || 'Unknown'}`;
}

function groupBy(items, keyFn) {
  const map = new Map();
  for (const item of items) {
    const key = keyFn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

function renderGroupList() {
  const groups = groupBy(allAssessments, (a) => groupKeyFor(a.candidates));

  if (!groups.size) {
    main.innerHTML = '<p class="kpi-note">No assessments submitted yet.</p>';
    return;
  }

  main.innerHTML = `
    <section class="panel">
      <h2>By Position</h2>
      ${Array.from(groups.entries()).map(([key, items]) => `
        <div class="group-card" data-key="${encodeURIComponent(key)}">
          <div>${key}</div>
          <div class="count">${items.length} assessment${items.length > 1 ? 's' : ''}</div>
        </div>
      `).join('')}
    </section>
  `;

  main.querySelectorAll('.group-card').forEach((card) => {
    card.addEventListener('click', () => renderGroupDetail(decodeURIComponent(card.dataset.key), groups.get(decodeURIComponent(card.dataset.key))));
  });
}

function pct(count, total) {
  return total ? Math.round((count / total) * 100) : 0;
}

function bar(label, yes, no) {
  const total = yes + no;
  return `
    <div class="bar-row">
      <div class="bar-label"><span>${label}</span><span>${yes} yes · ${no} no</span></div>
      <div class="bar-track">
        <div class="bar-fill yes" style="width:${pct(yes, total)}%"></div>
        <div class="bar-fill no" style="width:${pct(no, total)}%"></div>
      </div>
    </div>
  `;
}

function renderGroupDetail(key, items) {
  const answers = items.map((i) => i.answers);
  const employedYes = answers.filter((a) => a.currentlyEmployed === 'Yes').length;
  const employedNo = answers.filter((a) => a.currentlyEmployed === 'No').length;
  const willingYes = answers.filter((a) => a.willingLocation === 'Yes').length;
  const willingNo = answers.filter((a) => a.willingLocation === 'No').length;

  const noticeCounts = {};
  answers.forEach((a) => {
    if (a.currentlyEmployed === 'Yes' && a.noticePeriod) {
      noticeCounts[a.noticePeriod] = (noticeCounts[a.noticePeriod] || 0) + 1;
    }
  });

  main.innerHTML = `
    <section class="panel">
      <div class="actions" style="margin-top:0;margin-bottom:14px">
        <button class="btn-secondary" id="back-btn">← Back to positions</button>
      </div>
      <h2>${key}</h2>
      <p class="kpi-note" style="margin-top:-6px">${items.length} assessment${items.length > 1 ? 's' : ''} submitted</p>

      ${bar('Currently employed', employedYes, employedNo)}
      ${bar('Willing to work at office location', willingYes, willingNo)}

      ${Object.keys(noticeCounts).length ? `
        <div class="bar-row">
          <div class="bar-label"><span>Notice period (of those employed)</span></div>
          ${Object.entries(noticeCounts).map(([period, count]) => `
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0">
              <span>${period}</span><span>${count}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </section>

    <section class="panel">
      <h2>Candidates</h2>
      ${answers.map((a) => `
        <div class="candidate-row">
          <div class="name">${a.candidateName || a.candidateEmail}</div>
          <div class="meta">
            ${a.candidateEmail} · Employed: ${a.currentlyEmployed}${a.currentlyEmployed === 'Yes' ? ` (${a.noticePeriod || 'notice period n/a'})` : ''}
            · Expects: ${a.expectedSalary} · Available: ${a.availableFrom} · Willing to relocate: ${a.willingLocation}
          </div>
        </div>
      `).join('')}
    </section>
  `;

  document.getElementById('back-btn').addEventListener('click', renderGroupList);
}

async function loadAssessments() {
  const { data, error } = await sb
    .from('assessments')
    .select('answers, submitted_at, candidates(full_name, source_subject, recruitment_requests(designation, companies(name)))')
    .order('submitted_at', { ascending: false });

  if (error) {
    main.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  allAssessments = data;
  renderGroupList();
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('candidate-assessment.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadAssessments();
});
</script>

</body>
</html>
