<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Candidate Assessment — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>Candidate Assessment</h1>
    <p>Assessment submissions grouped by position, with a quick summary per group.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<style>
  .group-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; cursor: pointer; background: var(--panel);
  }
  .group-card:hover { border-color: var(--accent); }
  .group-card .count { font-size: 13px; color: var(--muted); }
  .bar-row { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .bar-track { height: 10px; border-radius: 999px; background: var(--bg); overflow: hidden; display: flex; }
  .bar-fill { height: 100%; }
  .bar-fill.yes { background: var(--accent); }
  .bar-fill.no { background: var(--muted); }
  .chart-block { margin-bottom: 26px; }
  .chart-block h3 { font-size: 13.5px; margin: 0 0 10px; color: var(--text); }
  .chart-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .chart-list-row {
    display: flex; justify-content: space-between; padding: 8px 12px; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .chart-list-row:last-child { border-bottom: none; }
  .chart-list-row .value { font-weight: 600; }
  .candidate-sheet {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 12px;
  }
  .candidate-sheet .name { font-weight: 700; font-size: 14.5px; }
  .candidate-sheet .meta { color: var(--muted); font-size: 12px; margin: 2px 0 10px; }
  .candidate-sheet .qa {
    display: flex; justify-content: space-between; gap: 12px; font-size: 13px;
    padding: 5px 0; border-top: 1px dashed var(--border);
  }
  .candidate-sheet .qa:first-of-type { border-top: none; }
  .candidate-sheet .qa span:first-child { color: var(--muted); }
  .candidate-sheet .qa span:last-child { font-weight: 600; text-align: right; }
</style>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script>
const main = document.getElementById('main-content');
let allAssessments = [];

function groupKeyFor(candidate) {
  const r = candidate.recruitment_requests;
  if (r) return `${r.companies?.name || '—'} / ${r.designation}`;
  return `Unassigned — ${candidate.source_subject || candidate.full_name || 'Unknown'}`;
}

function groupBy(items, keyFn) {
  const map = new Map();
  for (const item of items) {
    const key = keyFn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

function renderGroupList() {
  const groups = groupBy(allAssessments, (a) => groupKeyFor(a.candidates));

  if (!groups.size) {
    main.innerHTML = '<p class="kpi-note">No assessments submitted yet.</p>';
    return;
  }

  main.innerHTML = `
    <section class="panel">
      <h2>By Position</h2>
      ${Array.from(groups.entries()).map(([key, items]) => `
        <div class="group-card" data-key="${encodeURIComponent(key)}">
          <div>${key}</div>
          <div class="count">${items.length} assessment${items.length > 1 ? 's' : ''}</div>
        </div>
      `).join('')}
    </section>
  `;

  main.querySelectorAll('.group-card').forEach((card) => {
    card.addEventListener('click', () => renderGroupDetail(decodeURIComponent(card.dataset.key), groups.get(decodeURIComponent(card.dataset.key))));
  });
}

function pct(count, total) {
  return total ? Math.round((count / total) * 100) : 0;
}

function bar(label, yes, no) {
  const total = yes + no;
  return `
    <div class="bar-row">
      <div class="bar-label"><span>${label}</span><span>${yes} yes · ${no} no</span></div>
      <div class="bar-track">
        <div class="bar-fill yes" style="width:${pct(yes, total)}%"></div>
        <div class="bar-fill no" style="width:${pct(no, total)}%"></div>
      </div>
    </div>
  `;
}

function countBy(answers, field) {
  const counts = {};
  answers.forEach((a) => {
    const v = a[field] || '—';
    counts[v] = (counts[v] || 0) + 1;
  });
  return counts;
}

function listChart(title, answers, field) {
  return `
    <div class="chart-block">
      <h3>${title}</h3>
      <div class="chart-list">
        ${answers.map((a) => `
          <div class="chart-list-row">
            <span>${a.candidateName || a.candidateEmail}</span>
            <span class="value">${a[field] || '—'}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function yesNoChart(title, answers, field) {
  const yes = answers.filter((a) => a[field] === 'Yes').length;
  const no = answers.filter((a) => a[field] === 'No').length;
  return `<div class="chart-block"><h3>${title}</h3>${bar('', yes, no)}</div>`;
}

function breakdownChart(title, counts) {
  const entries = Object.entries(counts);
  if (!entries.length) return '';
  const total = entries.reduce((sum, [, c]) => sum + c, 0);
  return `
    <div class="chart-block">
      <h3>${title}</h3>
      ${entries.map(([label, count]) => `
        <div class="bar-row">
          <div class="bar-label"><span>${label}</span><span>${count}</span></div>
          <div class="bar-track"><div class="bar-fill yes" style="width:${pct(count, total)}%"></div></div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderGroupDetail(key, items) {
  const answers = items.map((i) => i.answers);

  main.innerHTML = `
    <section class="panel">
      <div class="actions" style="margin-top:0;margin-bottom:14px">
        <button class="btn-secondary" id="back-btn">← Back to positions</button>
      </div>
      <h2>${key}</h2>
      <p class="kpi-note" style="margin-top:-6px">${items.length} assessment${items.length > 1 ? 's' : ''} submitted</p>

      ${yesNoChart('Are you currently employed?', answers, 'currentlyEmployed')}
      ${breakdownChart('If employed, what is your notice period?', countBy(answers.filter((a) => a.currentlyEmployed === 'Yes'), 'noticePeriod'))}
      ${listChart('What is your expected monthly salary?', answers, 'expectedSalary')}
      ${listChart('When can you join?', answers, 'availableFrom')}
      ${yesNoChart('Are you willing to work in our office location?', answers, 'willingLocation')}
    </section>

    <section class="panel">
      <h2>Candidate Sheets</h2>
      ${answers.map((a) => `
        <div class="candidate-sheet">
          <div class="name">${a.candidateName || a.candidateEmail}</div>
          <div class="meta">${a.candidateEmail}</div>
          <div class="qa"><span>Are you currently employed?</span><span>${a.currentlyEmployed}</span></div>
          <div class="qa"><span>If employed, notice period</span><span>${a.currentlyEmployed === 'Yes' ? (a.noticePeriod || '—') : 'N/A'}</span></div>
          <div class="qa"><span>Expected monthly salary</span><span>${a.expectedSalary}</span></div>
          <div class="qa"><span>When can you join?</span><span>${a.availableFrom}</span></div>
          <div class="qa"><span>Willing to work in our office location?</span><span>${a.willingLocation}</span></div>
        </div>
      `).join('')}
    </section>
  `;

  document.getElementById('back-btn').addEventListener('click', renderGroupList);
}

async function loadAssessments() {
  const { data, error } = await sb
    .from('assessments')
    .select('answers, submitted_at, candidates(full_name, source_subject, recruitment_requests(designation, companies(name)))')
    .order('submitted_at', { ascending: false });

  if (error) {
    main.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  allAssessments = data;
  renderGroupList();
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('candidate-assessment.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadAssessments();
});
</script>

</body>
</html>
