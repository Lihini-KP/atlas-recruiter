<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Candidate Pipeline — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>Candidate Pipeline</h1>
    <p id="page-subtitle">Choose a company to see its shortlisted candidates.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<style>
  .crumb-nav { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .crumb-nav a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .crumb-nav a:hover { text-decoration: underline; }

  .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .tile {
    border-radius: 14px; padding: 22px 20px; cursor: pointer; border: 2px solid transparent;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
  .tile .tile-icon { font-size: 26px; margin-bottom: 10px; }
  .tile .tile-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .tile .tile-count { font-size: 12.5px; opacity: 0.8; }

  .pipeline-table { border-collapse: collapse; width: 100%; table-layout: fixed; font-size: 13px; }
  .pipeline-table th, .pipeline-table td {
    border: 1px solid var(--border); padding: 9px 14px; text-align: left;
    overflow-wrap: break-word; vertical-align: top;
  }
  .pipeline-table th { background: var(--bg); font-weight: 700; color: var(--muted); font-size: 12px; }
  .pipeline-table td:first-child { font-weight: 600; }
  /* Give Experience (and Education, also often long) more breathing room than the
     shorter columns, instead of every column splitting the width evenly. */
  .pipeline-table th:nth-child(1), .pipeline-table td:nth-child(1) { width: 13%; }
  .pipeline-table th:nth-child(2), .pipeline-table td:nth-child(2) { width: 9%; }
  .pipeline-table th:nth-child(3), .pipeline-table td:nth-child(3) { width: 15%; }
  .pipeline-table th:nth-child(4), .pipeline-table td:nth-child(4) { width: 32%; }
  .pipeline-table th:nth-child(5), .pipeline-table td:nth-child(5) { width: 11%; }
  .pipeline-table th:nth-child(6), .pipeline-table td:nth-child(6) { width: 10%; }
  .pipeline-table th:nth-child(7), .pipeline-table td:nth-child(7) { width: 10%; }
  .pipeline-table .pending { color: var(--muted); font-style: italic; }
  .pipeline-table .row-actions { display: flex; flex-direction: column; gap: 6px; }
  .pipeline-table .row-actions button { padding: 6px 10px; font-size: 12px; }
</style>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script src="lib/company-styles.js"></script>
<script>
const main = document.getElementById('main-content');
const pageSubtitle = document.getElementById('page-subtitle');
let allCandidates = [];
let allCompanies = [];

function groupBy(items, keyFn) {
  const map = new Map();
  for (const item of items) {
    const key = keyFn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

function companyOf(candidate) {
  return candidate.recruitment_requests?.companies?.name || 'Unassigned';
}

function renderCrumbs(parts) {
  return `<div class="crumb-nav">${parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    return isLast ? `<span>${p.label}</span>` : `<a data-nav="${p.nav}">${p.label}</a><span>›</span>`;
  }).join('')}</div>`;
}

function renderCompanyList() {
  pageSubtitle.textContent = 'Choose a company to see its shortlisted candidates.';
  const groups = groupBy(allCandidates, companyOf);

  const names = allCompanies.map((c) => c.name);
  if (groups.has('Unassigned')) names.push('Unassigned');

  main.innerHTML = `
    <div class="tile-grid">
      ${names.map((name) => {
        const count = (groups.get(name) || []).length;
        const s = companyStyleFor(name);
        return `
          <div class="tile" data-company="${encodeURIComponent(name)}" style="background:${s.bg};border-color:${s.border};color:${s.text}">
            <div class="tile-icon">${s.icon}</div>
            <div class="tile-name">${name}</div>
            <div class="tile-count">${count} shortlisted</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  main.querySelectorAll('.tile[data-company]').forEach((tile) => {
    tile.addEventListener('click', () => renderCompanyPipeline(decodeURIComponent(tile.dataset.company), groups.get(decodeURIComponent(tile.dataset.company)) || []));
  });
}

function latestAssessment(candidate) {
  const list = candidate.assessments || [];
  if (!list.length) return null;
  return list.slice().sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at))[0].answers;
}

async function cvSignedUrl(path) {
  if (!path) return null;
  const { data } = await sb.storage.from('cvs').createSignedUrl(path, 3600);
  return data?.signedUrl || null;
}

function cell(value, pendingLabel) {
  if (value) return value;
  return `<span class="pending">${pendingLabel || '—'}</span>`;
}

function renderRow(candidate) {
  const answers = latestAssessment(candidate) || {};
  const r = candidate.recruitment_requests;
  const position = r ? r.designation : 'Position not assigned';
  const analyzed = !!candidate.cv_analyzed_at;
  const noticePeriod = answers.currentlyEmployed === 'Yes'
    ? answers.noticePeriod
    : (answers.currentlyEmployed === 'No' ? 'Immediately available' : null);

  return `
    <tr data-id="${candidate.id}">
      <td>${candidate.full_name || candidate.email}<div class="pending" style="font-style:normal">${position}</div></td>
      <td>${cell(candidate.location, analyzed ? 'Not stated on CV' : 'Click "Analyze CV"')}</td>
      <td>${cell(candidate.education, analyzed ? 'Not stated on CV' : 'Click "Analyze CV"')}</td>
      <td>${cell(candidate.experience_summary, analyzed ? 'Not stated on CV' : 'Click "Analyze CV"')}</td>
      <td>${cell(answers.expectedSalary)}</td>
      <td>${cell(noticePeriod)}</td>
      <td>
        <div class="row-actions">
          ${candidate.cv_storage_path ? `<button class="btn-secondary view-cv-btn">View CV</button>` : ''}
          ${!analyzed && candidate.cv_storage_path ? `<button class="btn-primary analyze-btn">Analyze CV</button>` : ''}
        </div>
      </td>
    </tr>
  `;
}

function bindRow(candidate) {
  const row = main.querySelector(`tr[data-id="${candidate.id}"]`);
  if (!row) return;

  const viewBtn = row.querySelector('.view-cv-btn');
  if (viewBtn) {
    viewBtn.addEventListener('click', async () => {
      const url = await cvSignedUrl(candidate.cv_storage_path);
      if (url) window.open(url, '_blank');
    });
  }

  const analyzeBtn = row.querySelector('.analyze-btn');
  if (analyzeBtn) {
    analyzeBtn.addEventListener('click', async () => {
      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing…';
      try {
        const res = await fetch('/.netlify/functions/analyze-candidate-cv', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ candidateId: candidate.id }),
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Analysis failed');

        candidate.location = payload.candidate.location;
        candidate.education = payload.candidate.education;
        candidate.experience_summary = payload.candidate.experience_summary;
        candidate.cv_analyzed_at = payload.candidate.cv_analyzed_at;
        row.outerHTML = renderRow(candidate);
        bindRow(candidate);
      } catch (err) {
        alert(err.message);
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze CV';
      }
    });
  }
}

function renderCompanyPipeline(companyName, candidates) {
  pageSubtitle.textContent = `${companyName} · shortlisted candidates`;

  main.innerHTML = `
    ${renderCrumbs([{ label: 'Companies', nav: 'companies' }, { label: companyName }])}
    ${candidates.length ? `
      <section class="panel">
        <table class="pipeline-table">
          <thead>
            <tr>
              <th>Candidate</th>
              <th>Location</th>
              <th>Education</th>
              <th>Experience</th>
              <th>Salary Expectation</th>
              <th>Notice Period</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${candidates.map(renderRow).join('')}
          </tbody>
        </table>
      </section>
    ` : '<p class="kpi-note">No shortlisted candidates for this company yet.</p>'}
  `;

  main.querySelectorAll('[data-nav="companies"]').forEach((el) => el.addEventListener('click', renderCompanyList));
  candidates.forEach(bindRow);
}

async function loadPipeline() {
  const [companiesRes, candidatesRes] = await Promise.all([
    sb.from('companies').select('id, name').order('name'),
    sb
      .from('candidates')
      .select('id, full_name, email, cv_storage_path, location, education, experience_summary, cv_analyzed_at, recruitment_requests(designation, companies(name)), assessments(answers, submitted_at)')
      .eq('status', 'shortlisted')
      .order('applied_at', { ascending: false }),
  ]);

  if (companiesRes.error) {
    main.innerHTML = `<div class="status error">${companiesRes.error.message}</div>`;
    return;
  }
  if (candidatesRes.error) {
    main.innerHTML = `<div class="status error">${candidatesRes.error.message}</div>`;
    return;
  }

  allCompanies = companiesRes.data;
  allCandidates = candidatesRes.data;

  if (!allCandidates.length) {
    main.innerHTML = '<p class="kpi-note">No shortlisted candidates yet — shortlist someone from the Candidate Assessment tab.</p>';
    return;
  }

  renderCompanyList();
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('candidate-pipeline.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadPipeline();
});
</script>

</body>
</html>
