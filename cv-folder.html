<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CV Folder — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>CV Folder</h1>
    <p>CVs emailed to hra@esilkroute.com.lk are imported hourly and land here until assigned to a position.</p>
  </div>
</header>

<main>
  <section class="panel" id="unmatched-panel">
    <h2>Unmatched — needs review</h2>
    <div id="unmatched-list"><p class="kpi-note">Loading…</p></div>
  </section>

  <section class="panel" id="filed-panel">
    <h2>Filed by position</h2>
    <div id="filed-list"><p class="kpi-note">Loading…</p></div>
  </section>
</main>

<style>
  .cv-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .cv-row:last-child { border-bottom: none; }
  .cv-row .cv-info { flex: 1; }
  .cv-row .cv-name { font-size: 13px; font-weight: 600; }
  .cv-row .cv-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cv-row select { max-width: 220px; }
  .folder-group { margin-bottom: 18px; }
  .folder-group h3 {
    font-size: 11px; margin: 0 0 10px; padding: 6px 10px; background: var(--bg); border-radius: 6px;
    color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .new-folder-inline { display: none; gap: 8px; align-items: center; }
  .new-folder-inline select, .new-folder-inline input { max-width: 170px; font-size: 12px; padding: 6px 8px; }
  .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 10px; }
  .tile {
    position: relative;
    border-radius: 12px; padding: 14px; cursor: pointer; border: 2px solid var(--border); background: var(--bg);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
  .tile .tile-name { font-weight: 700; font-size: 12.5px; margin-bottom: 4px; padding-right: 20px; }
  .tile .tile-count { font-size: 11px; color: var(--muted); }
  .tile-delete-btn {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    width: 20px; height: 20px; padding: 0; border-radius: 50%;
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
    font-size: 10px; line-height: 1; cursor: pointer;
  }
  .tile-delete-btn:hover { background: #dc2626; border-color: #dc2626; color: white; }
  .crumb-nav { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .crumb-nav a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .crumb-nav a:hover { text-decoration: underline; }
</style>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script>
const unmatchedList = document.getElementById('unmatched-list');
const filedList = document.getElementById('filed-list');
let openRequests = [];
let manualFolders = [];
let companies = [];

async function cvSignedUrl(path) {
  if (!path) return '#';
  const { data } = await sb.storage.from('cvs').createSignedUrl(path, 3600);
  return data?.signedUrl || '#';
}

async function loadOpenRequests() {
  const { data, error } = await sb
    .from('recruitment_requests')
    .select('id, designation, department, companies(name)')
    .eq('status', 'approved')
    .order('designation');
  if (error) return [];
  return data;
}

async function loadManualFolders() {
  const { data, error } = await sb
    .from('manual_folders')
    .select('id, designation, companies(name)')
    .order('designation');
  if (error) return [];
  return data;
}

async function loadCompanies() {
  const { data, error } = await sb.from('companies').select('id, name').order('name');
  if (error) return [];
  return data;
}

function assignOptionsHTML() {
  const requestOptions = openRequests
    .map((r) => `<option value="req:${r.id}">${r.designation} — ${r.companies?.name || ''} (${r.department})</option>`)
    .join('');
  const folderOptions = manualFolders
    .map((f) => `<option value="folder:${f.id}">${f.designation} — ${f.companies?.name || ''} (manual)</option>`)
    .join('');
  const companyOptions = companies.map((c) => `<option value="${c.id}">${c.name}</option>`).join('');
  return { requestOptions, folderOptions, companyOptions };
}

function assignControlHTML(rowKey) {
  const { requestOptions, folderOptions, companyOptions } = assignOptionsHTML();
  return `
    <select class="assign-select" data-row="${rowKey}">
      <option value="">Assign to position…</option>
      ${requestOptions ? `<optgroup label="Open Positions">${requestOptions}</optgroup>` : ''}
      ${folderOptions ? `<optgroup label="Manual Folders">${folderOptions}</optgroup>` : ''}
      <option value="__new__">+ Create new folder…</option>
    </select>
    <span class="new-folder-inline" data-row="${rowKey}">
      <select class="new-folder-company"><option value="">Company…</option>${companyOptions}</select>
      <input type="text" class="new-folder-designation" placeholder="Designation" />
    </span>
    <button class="btn-primary assign-btn" data-row="${rowKey}" style="padding:8px 14px;font-size:12.5px">Assign</button>
  `;
}

function wireAssignControl(row, onAssigned) {
  const select = row.querySelector('.assign-select');
  const inline = row.querySelector('.new-folder-inline');
  const btn = row.querySelector('.assign-btn');

  select.addEventListener('change', () => {
    const isNew = select.value === '__new__';
    inline.style.display = isNew ? 'flex' : 'none';
    btn.textContent = isNew ? 'Create & Assign' : 'Assign';
  });

  btn.addEventListener('click', async () => {
    if (select.value === '__new__') {
      const companyId = row.querySelector('.new-folder-company').value;
      const designation = row.querySelector('.new-folder-designation').value.trim();
      if (!companyId || !designation) {
        alert('Pick a company and type a designation for the new folder.');
        return;
      }
      const { data: newFolder, error: folderError } = await sb
        .from('manual_folders')
        .insert({ company_id: companyId, designation })
        .select()
        .single();
      if (folderError) {
        alert(folderError.message);
        return;
      }
      await onAssigned({ manual_folder_id: newFolder.id, recruitment_request_id: null });
      manualFolders = await loadManualFolders();
      return;
    }

    if (!select.value) return;
    const [kind, id] = select.value.split(':');
    if (kind === 'req') await onAssigned({ recruitment_request_id: id, manual_folder_id: null });
    else if (kind === 'folder') await onAssigned({ manual_folder_id: id, recruitment_request_id: null });
  });
}

let unmatchedCandidates = [];

// Mirrors extractDesignationFromSubject() in google-apps-script/cv-import.gs, so the
// guessed designation shown here matches what the thank-you email referenced.
function guessDesignation(subject) {
  if (!subject) return 'Unspecified / Other';
  let s = subject.trim();
  const prefixes = [
    /^cv\s+submission\s+for\s+/i,
    /^cv\s+for\s+/i,
    /^application\s+for\s+/i,
    /^job\s+application\s+for\s+/i,
    /^re:\s*/i,
  ];
  prefixes.forEach((p) => { s = s.replace(p, ''); });
  s = s.replace(/\s*[-–—]\s*[A-Z][a-zA-Z.'\s]{2,40}$/, '').trim();
  return s || 'Unspecified / Other';
}

function renderUnmatchedTiles() {
  const groups = groupBy(unmatchedCandidates, (c) => guessDesignation(c.source_subject));

  unmatchedList.innerHTML = `
    <div class="tile-grid">
      ${Array.from(groups.entries()).map(([designation, items]) => `
        <div class="tile" data-designation="${encodeURIComponent(designation)}">
          <div class="tile-name">${designation}</div>
          <div class="tile-count">${items.length} CV${items.length === 1 ? '' : 's'}</div>
        </div>
      `).join('')}
    </div>
  `;

  unmatchedList.querySelectorAll('.tile[data-designation]').forEach((tile) => {
    tile.addEventListener('click', () => renderUnmatchedRows(decodeURIComponent(tile.dataset.designation)));
  });
}

async function renderUnmatchedRows(designation) {
  const items = unmatchedCandidates.filter((c) => guessDesignation(c.source_subject) === designation);

  unmatchedList.innerHTML = `
    <div class="crumb-nav"><a data-nav="unmatched-designations">All designations</a><span>›</span><span>${designation}</span></div>
    <div id="unmatched-rows"></div>
  `;
  unmatchedList.querySelector('[data-nav="unmatched-designations"]').addEventListener('click', renderUnmatchedTiles);

  const rowsContainer = unmatchedList.querySelector('#unmatched-rows');
  const rows = await Promise.all(items.map(async (c) => {
    const url = await cvSignedUrl(c.cv_storage_path);
    return `
      <div class="cv-row" data-id="${c.id}">
        <div class="cv-info">
          <div class="cv-name">${c.full_name || c.email || 'Unknown sender'}</div>
          <div class="cv-meta">${c.email || ''} · ${c.source_subject || ''} · ${new Date(c.applied_at).toLocaleString()}</div>
        </div>
        <a href="${url}" target="_blank" class="btn-secondary" style="text-decoration:none;padding:8px 14px;font-size:12.5px">View CV</a>
        ${assignControlHTML(c.id)}
      </div>
    `;
  }));

  rowsContainer.innerHTML = rows.join('');

  items.forEach((c) => {
    const row = rowsContainer.querySelector(`.cv-row[data-id="${c.id}"]`);
    wireAssignControl(row, async (fields) => {
      const { error: updateError } = await sb
        .from('candidates')
        .update({ ...fields, status: 'applied' })
        .eq('id', c.id);

      if (updateError) {
        alert(updateError.message);
        return;
      }

      unmatchedCandidates = unmatchedCandidates.filter((u) => u.id !== c.id);
      loadFiled();
      if (unmatchedCandidates.filter((u) => guessDesignation(u.source_subject) === designation).length === 0) {
        renderUnmatchedTiles();
      } else {
        renderUnmatchedRows(designation);
      }
    });
  });
}

async function loadUnmatched() {
  const { data, error } = await sb
    .from('candidates')
    .select('*')
    .eq('status', 'unmatched')
    .order('applied_at', { ascending: false });

  if (error) {
    unmatchedList.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  unmatchedCandidates = data;

  if (!data.length) {
    unmatchedList.innerHTML = '<p class="kpi-note">Nothing waiting on review.</p>';
    return;
  }

  renderUnmatchedTiles();
}

function groupBy(items, keyFn) {
  const map = new Map();
  for (const item of items) {
    const key = keyFn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

let filedCandidates = [];

function filedGroupKey(c) {
  const r = c.recruitment_requests;
  const mf = c.manual_folders;
  if (r) return `${r.companies?.name || '—'} / ${r.department} / ${r.designation}`;
  if (mf) return `${mf.companies?.name || '—'} / ${mf.designation} (manual folder)`;
  return 'Unassigned';
}

function renderFiledTiles() {
  const groups = groupBy(filedCandidates, filedGroupKey);
  const isAdmin = window.currentProfile?.role === 'admin';

  filedList.innerHTML = `
    <div class="tile-grid">
      ${Array.from(groups.entries()).map(([groupKey, items]) => `
        <div class="tile" data-group="${encodeURIComponent(groupKey)}">
          ${isAdmin ? `<button type="button" class="tile-delete-btn" data-group="${encodeURIComponent(groupKey)}" title="Delete this folder's candidates and all their data">✕</button>` : ''}
          <div class="tile-name">${groupKey}</div>
          <div class="tile-count">${items.length} candidate${items.length === 1 ? '' : 's'}</div>
        </div>
      `).join('')}
    </div>
  `;

  filedList.querySelectorAll('.tile[data-group]').forEach((tile) => {
    tile.addEventListener('click', (e) => {
      if (e.target.closest('.tile-delete-btn')) return;
      renderFiledRows(decodeURIComponent(tile.dataset.group));
    });
  });

  filedList.querySelectorAll('.tile-delete-btn').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const groupKey = decodeURIComponent(btn.dataset.group);
      const items = filedCandidates.filter((c) => filedGroupKey(c) === groupKey);
      const manualFolderId = items[0].manual_folder_id;
      const isRealPosition = !!items[0].recruitment_request_id;

      const positionNote = isRealPosition
        ? '\n\nThe open position itself will NOT be deleted — only these candidates and their data.'
        : '';
      const confirmed = confirm(
        `Delete "${groupKey}"?\n\nThis will PERMANENTLY delete ${items.length} candidate(s) and all their assessment, interview, and offer records. This cannot be undone.${positionNote}`
      );
      if (!confirmed) return;

      btn.disabled = true;
      btn.textContent = '…';

      const candidateIds = items.map((c) => c.id);
      const { error: interviewsError } = await sb.from('interviews').delete().in('candidate_id', candidateIds);
      const { error: offersError } = await sb.from('offers').delete().in('candidate_id', candidateIds);
      const { error: assessmentsError } = await sb.from('assessments').delete().in('candidate_id', candidateIds);
      const { error: candidatesError } = await sb.from('candidates').delete().in('id', candidateIds);
      const { error: folderError } = manualFolderId
        ? await sb.from('manual_folders').delete().eq('id', manualFolderId)
        : { error: null };

      const firstError = interviewsError || offersError || assessmentsError || candidatesError || folderError;
      if (firstError) {
        alert('Delete failed: ' + firstError.message);
        btn.disabled = false;
        btn.textContent = '✕';
        return;
      }

      manualFolders = await loadManualFolders();
      await loadFiled();
    });
  });
}

async function renderFiledRows(groupKey) {
  const items = filedCandidates.filter((c) => filedGroupKey(c) === groupKey);
  const isUnassigned = groupKey === 'Unassigned';

  filedList.innerHTML = `
    <div class="crumb-nav"><a data-nav="filed-groups">All positions</a><span>›</span><span>${groupKey}</span></div>
    <div id="filed-rows"></div>
  `;
  filedList.querySelector('[data-nav="filed-groups"]').addEventListener('click', renderFiledTiles);

  const rowsContainer = filedList.querySelector('#filed-rows');
  const rows = await Promise.all(items.map(async (c) => {
    const url = await cvSignedUrl(c.cv_storage_path);
    return `
      <div class="cv-row" data-filed-id="${c.id}">
        <div class="cv-info">
          <div class="cv-name">${c.full_name || c.email || 'Unknown'}</div>
          <div class="cv-meta">${c.email || ''} · Status: ${c.status} · ${new Date(c.applied_at).toLocaleDateString()}</div>
        </div>
        <a href="${url}" target="_blank" class="btn-secondary" style="text-decoration:none;padding:8px 14px;font-size:12.5px">View CV</a>
        ${isUnassigned ? assignControlHTML(c.id) : ''}
      </div>
    `;
  }));

  rowsContainer.innerHTML = rows.join('');

  if (isUnassigned) {
    items.forEach((c) => {
      const row = rowsContainer.querySelector(`.cv-row[data-filed-id="${c.id}"]`);
      if (!row) return;
      wireAssignControl(row, async (fields) => {
        const { error: updateError } = await sb
          .from('candidates')
          .update(fields)
          .eq('id', c.id);

        if (updateError) {
          alert(updateError.message);
          return;
        }

        await loadFiled();
      });
    });
  }
}

async function loadFiled() {
  const { data, error } = await sb
    .from('candidates')
    .select('*, recruitment_requests(designation, department, companies(name)), manual_folders(designation, companies(name))')
    .neq('status', 'unmatched')
    .order('applied_at', { ascending: false });

  if (error) {
    filedList.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  filedCandidates = data;

  if (!data.length) {
    filedList.innerHTML = '<p class="kpi-note">No candidates filed yet.</p>';
    return;
  }

  renderFiledTiles();
}

window.authReady.then(async (profile) => {
  if (!profile) return;
  renderSidebar('cv-folder.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    unmatchedList.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    filedList.innerHTML = '';
    return;
  }
  [openRequests, manualFolders, companies] = await Promise.all([loadOpenRequests(), loadManualFolders(), loadCompanies()]);
  await Promise.all([loadUnmatched(), loadFiled()]);
});
</script>

</body>
</html>
