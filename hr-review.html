<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HR Review — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>HR Review</h1>
    <p>Recruitment requests awaiting HR review before CEO approval.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script>
const main = document.getElementById('main-content');

function renderRequest(r) {
  return `
    <section class="panel" data-id="${r.id}">
      <h2>${r.designation} · ${r.companies.name}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:-8px">
        ${r.department} · ${r.employment_type} · ${r.vacancies} vacancy(ies) · Priority: ${r.priority}
      </p>
      <div class="grid">
        <div class="field"><label>Work Location</label><div>${r.work_location}</div></div>
        <div class="field"><label>Reporting Manager</label><div>${r.reporting_manager}</div></div>
        <div class="field"><label>Required Experience</label><div>${r.required_experience}</div></div>
        <div class="field"><label>Reason</label><div>${r.reason}${r.reason_other_text ? ' — ' + r.reason_other_text : ''}</div></div>
        <div class="field full"><label>Required Qualifications</label><div>${r.required_qualifications}</div></div>
        ${r.additional_remarks ? `<div class="field full"><label>Additional Remarks</label><div>${r.additional_remarks}</div></div>` : ''}
      </div>
      <div class="actions">
        <button class="btn-primary" data-action="forward">Forward to CEO</button>
        <button class="btn-secondary" data-action="on_hold">Put On Hold</button>
        <button class="btn-secondary" data-action="rejected" style="color:#dc2626">Reject</button>
      </div>
      <div class="status hidden"></div>
    </section>
  `;
}

async function loadQueue() {
  const { data, error } = await supabase
    .from('recruitment_requests')
    .select('*, companies(name)')
    .eq('status', 'pending_approval')
    .is('hr_reviewed_at', null)
    .order('created_at', { ascending: true });

  if (error) {
    main.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  if (!data.length) {
    main.innerHTML = '<p class="kpi-note">No requests waiting on HR review.</p>';
    return;
  }

  main.innerHTML = data.map(renderRequest).join('');

  main.querySelectorAll('[data-action]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const section = btn.closest('section');
      const id = section.dataset.id;
      const action = btn.dataset.action;
      const statusEl = section.querySelector('.status');
      section.querySelectorAll('button').forEach((b) => (b.disabled = true));

      const newStatus = action === 'forward' ? 'pending_approval' : action;
      const patch = { status: newStatus, hr_reviewed_by: window.currentProfile.id, hr_reviewed_at: new Date().toISOString() };

      const { data: updated, error: updateError } = await supabase
        .from('recruitment_requests')
        .update(patch)
        .eq('id', id)
        .select()
        .single();

      if (updateError) {
        statusEl.textContent = updateError.message;
        statusEl.className = 'status error';
        statusEl.classList.remove('hidden');
        section.querySelectorAll('button').forEach((b) => (b.disabled = false));
        return;
      }

      await supabase.from('audit_log').insert({
        actor_profile_id: window.currentProfile.id,
        action: `hr_${action}`,
        entity_type: 'recruitment_request',
        entity_id: id,
        after: updated,
      });

      section.remove();
      if (!main.querySelector('section')) main.innerHTML = '<p class="kpi-note">No requests waiting on HR review.</p>';
    });
  });
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('hr-review.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadQueue();
});
</script>

</body>
</html>
