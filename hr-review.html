<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<script>(function(){var t=localStorage.getItem('atlas-theme');if(t)document.documentElement.dataset.theme=t;})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HR Review — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>HR Review</h1>
    <p>Recruitment requests awaiting HR approval.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<script src="lib/supabase-client.js"></script>
<script src="lib/sso.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script src="lib/poster-templates.js"></script>
<script src="lib/generate-poster.js"></script>
<script src="lib/atlas-task.js"></script>
<script>
const main = document.getElementById('main-content');

function renderRequest(r) {
  return `
    <section class="panel" data-id="${r.id}">
      <h2>${r.designation} · ${r.companies.name}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:-8px">
        ${r.department} · ${r.employment_type} · ${r.vacancies} vacancy(ies) · Priority: ${r.priority}
      </p>
      <div class="grid">
        <div class="field"><label>Work Location</label><div>${r.work_location}</div></div>
        <div class="field"><label>Reporting Manager</label><div>${r.reporting_manager}</div></div>
        <div class="field"><label>Required Experience</label><div>${r.required_experience}</div></div>
        <div class="field"><label>Reason</label><div>${r.reason}${r.reason_other_text ? ' — ' + r.reason_other_text : ''}</div></div>
        <div class="field full"><label>Required Qualifications</label><div>${r.required_qualifications}</div></div>
        ${r.additional_remarks ? `<div class="field full"><label>Additional Remarks</label><div>${r.additional_remarks}</div></div>` : ''}
      </div>
      <div class="actions">
        <button class="btn-primary" data-action="approved">Approve</button>
        <button class="btn-secondary" data-action="on_hold">Put On Hold</button>
        <button class="btn-secondary" data-action="rejected" style="color:var(--red)">Reject</button>
      </div>
      <div class="status hidden"></div>
    </section>
  `;
}

function slugify(s) {
  return s.trim().replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

async function createAdvertisement(r) {
  const now = new Date();
  const blob = await generatePosterImage({
    companyCode: r.companies.code,
    designation: r.designation,
    workLocation: r.work_location,
    employmentType: r.employment_type,
    vacancies: r.vacancies,
  });

  if (!blob) {
    return { skipped: true, reason: `No poster template yet for ${r.companies.name}` };
  }

  const path = `${r.companies.code}/${slugify(r.department)}/${slugify(r.designation)}/${now.getFullYear()}/${now.getMonth() + 1}/poster.png`;

  const { error: uploadError } = await sb.storage.from('advertisements').upload(path, blob, {
    contentType: 'image/png',
    upsert: true,
  });
  if (uploadError) throw uploadError;

  const { error: insertError } = await sb.from('advertisements').insert({
    recruitment_request_id: r.id,
    company_code: r.companies.code,
    designation: r.designation,
    poster_storage_path: path,
    published: false,
  });
  if (insertError) throw insertError;

  return { skipped: false };
}

async function loadQueue() {
  const { data, error } = await sb
    .from('recruitment_requests')
    .select('*, companies(name, code)')
    .eq('status', 'pending_approval')
    .order('created_at', { ascending: true });

  if (error) {
    main.innerHTML = `<div class="status error">${error.message}</div>`;
    return;
  }

  if (!data.length) {
    main.innerHTML = '<p class="kpi-note">No requests waiting on HR review.</p>';
    return;
  }

  main.innerHTML = data.map(renderRequest).join('');

  data.forEach((r) => {
    const section = main.querySelector(`section[data-id="${r.id}"]`);
    section.querySelectorAll('[data-action]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        const statusEl = section.querySelector('.status');
        section.querySelectorAll('button').forEach((b) => (b.disabled = true));

        const patch = { status: action, hr_reviewed_by: window.currentProfile.id, hr_reviewed_at: new Date().toISOString() };

        const { data: updated, error: updateError } = await sb
          .from('recruitment_requests')
          .update(patch)
          .eq('id', r.id)
          .select()
          .single();

        if (updateError) {
          statusEl.textContent = updateError.message;
          statusEl.className = 'status error';
          statusEl.classList.remove('hidden');
          section.querySelectorAll('button').forEach((b) => (b.disabled = false));
          return;
        }

        await sb.from('audit_log').insert({
          actor_profile_id: window.currentProfile.id,
          action: `hr_${action}`,
          entity_type: 'recruitment_request',
          entity_id: r.id,
          after: updated,
        });

        if (action === 'approved' || action === 'rejected') {
          await postAtlasTask({
            kind: 'requisition',
            action: 'resolve',
            id: r.id,
            outcome: action === 'approved' ? 'approved' : 'rejected',
            title: `Requisition approval: ${r.designation} — ${r.department} (${r.companies.name})`,
          });
        }

        if (action === 'approved') {
          try {
            const result = await createAdvertisement(r);
            if (result.skipped) {
              statusEl.textContent = `Approved. ${result.reason} — add it via the Advertisement tab once available.`;
              statusEl.className = 'status';
              statusEl.classList.remove('hidden');
              setTimeout(() => section.remove(), 2500);
              return;
            }
          } catch (adErr) {
            statusEl.textContent = `Approved, but advertisement generation failed: ${adErr.message}`;
            statusEl.className = 'status error';
            statusEl.classList.remove('hidden');
            return;
          }
        }

        section.remove();
        if (!main.querySelector('section')) main.innerHTML = '<p class="kpi-note">No requests waiting on HR review.</p>';
      });
    });
  });
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('hr-review.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadQueue();
});
</script>

</body>
</html>
