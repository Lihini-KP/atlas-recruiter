<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recruiter — Alex, Recruitment Coordinator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="brand">
    <h1>Alex — Recruitment Coordinator</h1>
    <p>ATLAS Recruitment Agent · submit a request and Alex drafts the advertisement and notifies HR</p>
  </div>
  <nav>
    <a href="index.html" class="active">New Request</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>
</header>

<main>
  <section class="panel" id="request-panel">
    <h2>New Recruitment Request</h2>
    <form id="request-form">
      <div class="grid">
        <div class="field"><label>Department *</label><input name="department" required /></div>
        <div class="field"><label>Position *</label><input name="position" required /></div>
        <div class="field"><label>Number of Vacancies *</label><input name="vacancies" type="number" min="1" value="1" required /></div>
        <div class="field">
          <label>Employment Type *</label>
          <select name="employmentType" required>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Contract">Contract</option>
            <option value="Internship">Internship</option>
          </select>
        </div>
        <div class="field"><label>Location *</label><input name="location" required /></div>
        <div class="field"><label>Reporting Manager *</label><input name="reportingManager" required /></div>
        <div class="field full"><label>Reason for Hiring *</label><textarea name="reasonForHiring" required></textarea></div>
        <div class="field full"><label>Job Description *</label><textarea name="jobDescription" rows="4" required></textarea></div>
        <div class="field full"><label>Required Qualifications *</label><textarea name="qualifications" required></textarea></div>
        <div class="field"><label>Required Experience *</label><input name="experience" required /></div>
        <div class="field full"><label>Required Skills *</label><textarea name="skills" required></textarea></div>
        <div class="field"><label>Salary Range (optional)</label><input name="salaryRange" /></div>
        <div class="field"><label>Expected Joining Date *</label><input name="joiningDate" type="date" required /></div>
        <div class="field">
          <label>Priority *</label>
          <select name="priority" required>
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button type="submit" class="btn-primary" id="generate-btn">Generate Job Advertisement</button>
      </div>
      <div class="status hidden" id="generate-status"></div>
    </form>
  </section>

  <section class="panel hidden" id="ad-panel">
    <h2>Generated Advertisement</h2>
    <div class="tabs" id="ad-tabs"></div>
    <div class="ad-body" id="ad-body"></div>
    <div class="actions">
      <button class="btn-primary" id="send-hr-btn">Email HR</button>
      <button class="btn-secondary" id="edit-btn">Back to Request</button>
    </div>
    <div class="status hidden" id="send-status"></div>
  </section>
</main>

<script>
const requestForm = document.getElementById('request-form');
const generateBtn = document.getElementById('generate-btn');
const generateStatus = document.getElementById('generate-status');
const requestPanel = document.getElementById('request-panel');
const adPanel = document.getElementById('ad-panel');
const adTabs = document.getElementById('ad-tabs');
const adBody = document.getElementById('ad-body');
const sendHrBtn = document.getElementById('send-hr-btn');
const sendStatus = document.getElementById('send-status');
const editBtn = document.getElementById('edit-btn');

let currentRequest = null;
let currentAd = null;

const PLATFORM_LABELS = {
  linkedin: 'LinkedIn',
  topjobs: 'TopJobs',
  xpressjobs: 'XpressJobs',
  facebook_jobs: 'Facebook Jobs',
  careers_page: 'Careers Page',
};

function setStatus(el, message, type) {
  el.textContent = message;
  el.className = 'status' + (type ? ' ' + type : '');
  el.classList.remove('hidden');
}

function showTab(key) {
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.key === key));
  adBody.textContent = currentAd.platform_variants[key];
}

requestForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(requestForm).entries());
  generateBtn.disabled = true;
  generateBtn.innerHTML = '<span class="spinner"></span>Generating…';
  generateStatus.classList.add('hidden');

  try {
    const res = await fetch('/.netlify/functions/generate-ad', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(data),
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || 'Failed to generate advertisement');

    currentRequest = payload.request;
    currentAd = payload.ad;

    adTabs.innerHTML = '';
    Object.keys(PLATFORM_LABELS).forEach((key, i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === 0 ? ' active' : '');
      tab.textContent = PLATFORM_LABELS[key];
      tab.dataset.key = key;
      tab.addEventListener('click', () => showTab(key));
      adTabs.appendChild(tab);
    });
    adBody.textContent = currentAd.platform_variants[Object.keys(PLATFORM_LABELS)[0]];

    requestPanel.classList.add('hidden');
    adPanel.classList.remove('hidden');
    sendStatus.classList.add('hidden');
  } catch (err) {
    setStatus(generateStatus, err.message, 'error');
  } finally {
    generateBtn.disabled = false;
    generateBtn.textContent = 'Generate Job Advertisement';
  }
});

sendHrBtn.addEventListener('click', async () => {
  sendHrBtn.disabled = true;
  sendHrBtn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const res = await fetch('/.netlify/functions/notify-hr', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ request: currentRequest, ad: currentAd }),
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || 'Failed to email HR');
    setStatus(sendStatus, 'HR has been notified with the advertisement attached.', 'ok');
  } catch (err) {
    setStatus(sendStatus, err.message, 'error');
  } finally {
    sendHrBtn.disabled = false;
    sendHrBtn.textContent = 'Email HR';
  }
});

editBtn.addEventListener('click', () => {
  adPanel.classList.add('hidden');
  requestPanel.classList.remove('hidden');
});
</script>

</body>
</html>
