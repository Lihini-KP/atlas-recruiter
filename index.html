<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>New Recruitment Request — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>New Recruitment Request</h1>
    <p>Submitted requests go to HR review, then CEO approval, before recruitment starts.</p>
  </div>
</header>

<main>
  <section class="panel" id="request-panel">
    <h2>Recruitment Request</h2>
    <form id="request-form">
      <div class="grid">
        <div class="field">
          <label>Company *</label>
          <select name="companyId" id="company-select" required></select>
        </div>
        <div class="field"><label>Department *</label><input name="department" required /></div>
        <div class="field"><label>Designation *</label><input name="designation" required /></div>
        <div class="field"><label>Number of Vacancies *</label><input name="vacancies" type="number" min="1" value="1" required /></div>
        <div class="field">
          <label>Employment Type *</label>
          <select name="employmentType" required>
            <option value="Permanent">Permanent</option>
            <option value="Contract">Contract</option>
            <option value="Internship">Internship</option>
            <option value="Part Time">Part Time</option>
            <option value="Temporary">Temporary</option>
          </select>
        </div>
        <div class="field"><label>Work Location *</label><input name="workLocation" required /></div>
        <div class="field"><label>Reporting Manager *</label><input name="reportingManager" required /></div>
        <div class="field"><label>Salary Range</label><input name="salaryRange" /></div>
        <div class="field"><label>Required Experience *</label><input name="requiredExperience" required /></div>
        <div class="field full"><label>Required Qualifications *</label><textarea name="requiredQualifications" required></textarea></div>
        <div class="field"><label>Preferred Gender (optional)</label>
          <select name="preferredGender">
            <option value="">No preference</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="field"><label>Preferred Age Range (optional)</label><input name="preferredAgeRange" placeholder="e.g. 25-35" /></div>
        <div class="field"><label>Requested By</label><input id="requested-by-display" disabled /></div>
        <div class="field"><label>Request Date *</label><input name="requestDate" type="date" required /></div>
        <div class="field">
          <label>Priority *</label>
          <select name="priority" required>
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>
        <div class="field">
          <label>Reason for Recruitment *</label>
          <select name="reason" id="reason-select" required>
            <option value="New Position">New Position</option>
            <option value="Replacement">Replacement</option>
            <option value="Expansion">Expansion</option>
            <option value="Internal Transfer">Internal Transfer</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field full hidden" id="reason-other-field">
          <label>Please specify</label>
          <input name="reasonOtherText" />
        </div>
        <div class="field full"><label>Additional Remarks</label><textarea name="additionalRemarks"></textarea></div>
      </div>
      <div class="actions">
        <button type="submit" class="btn-primary" id="submit-btn">Submit Request</button>
      </div>
      <div class="status hidden" id="submit-status"></div>
    </form>
  </section>

  <section class="panel hidden" id="done-panel">
    <h2>Request Submitted</h2>
    <p>Your recruitment request has been sent for HR review, then CEO approval. You can track its
    status from the Dashboard.</p>
  </section>
</main>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script>
const form = document.getElementById('request-form');
const submitBtn = document.getElementById('submit-btn');
const submitStatus = document.getElementById('submit-status');
const requestPanel = document.getElementById('request-panel');
const donePanel = document.getElementById('done-panel');
const companySelect = document.getElementById('company-select');
const reasonSelect = document.getElementById('reason-select');
const reasonOtherField = document.getElementById('reason-other-field');
const requestedByDisplay = document.getElementById('requested-by-display');

form.requestDate.valueAsDate = new Date();

reasonSelect.addEventListener('change', () => {
  reasonOtherField.classList.toggle('hidden', reasonSelect.value !== 'Other');
});

function setStatus(el, message, type) {
  el.textContent = message;
  el.className = 'status' + (type ? ' ' + type : '');
  el.classList.remove('hidden');
}

window.authReady.then(async (profile) => {
  if (!profile) return;
  renderSidebar('index.html');
  requestedByDisplay.value = `${profile.full_name} (${profile.role.replace('_', ' ')})`;

  const { data: companies, error } = await supabase.from('companies').select('id, name').order('name');
  if (error) {
    setStatus(submitStatus, `Could not load companies: ${error.message}`, 'error');
    return;
  }
  companySelect.innerHTML = companies.map((c) => `<option value="${c.id}">${c.name}</option>`).join('');
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const profile = window.currentProfile;
  if (!profile) return;

  const data = Object.fromEntries(new FormData(form).entries());
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';
  submitStatus.classList.add('hidden');

  const row = {
    company_id: data.companyId,
    department: data.department,
    designation: data.designation,
    vacancies: Number(data.vacancies),
    employment_type: data.employmentType,
    work_location: data.workLocation,
    reporting_manager: data.reportingManager,
    salary_range: data.salaryRange || null,
    required_experience: data.requiredExperience,
    required_qualifications: data.requiredQualifications,
    preferred_gender: data.preferredGender || null,
    preferred_age_range: data.preferredAgeRange || null,
    requested_by: profile.id,
    request_date: data.requestDate,
    priority: data.priority,
    reason: data.reason,
    reason_other_text: data.reason === 'Other' ? data.reasonOtherText : null,
    additional_remarks: data.additionalRemarks || null,
    status: 'pending_approval',
  };

  const { data: inserted, error } = await supabase.from('recruitment_requests').insert(row).select().single();

  if (error) {
    setStatus(submitStatus, error.message, 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Request';
    return;
  }

  await supabase.from('audit_log').insert({
    actor_profile_id: profile.id,
    action: 'submitted',
    entity_type: 'recruitment_request',
    entity_id: inserted.id,
    before: null,
    after: inserted,
  });

  requestPanel.classList.add('hidden');
  donePanel.classList.remove('hidden');
});
</script>

</body>
</html>
