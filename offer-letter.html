<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offer Letter — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="with-sidebar">

<div id="sidebar-root"></div>

<header>
  <div class="brand">
    <h1>Offer Letter</h1>
    <p id="page-subtitle">Candidates selected after interview, ready for an offer.</p>
  </div>
</header>

<main id="main-content">
  <p class="kpi-note">Loading…</p>
</main>

<style>
  main { max-width: none; margin: 0; }

  .crumb-nav { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .crumb-nav a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .crumb-nav a:hover { text-decoration: underline; }

  .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  .tile {
    border-radius: 12px; padding: 15px 14px; cursor: pointer; border: 2px solid transparent;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
  .tile .tile-icon { font-size: 20px; margin-bottom: 8px; }
  .tile .tile-logo { height: 32px; max-width: 100%; object-fit: contain; object-position: left; margin-bottom: 9px; display: block; }
  .tile .tile-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .tile .tile-count { font-size: 11px; opacity: 0.8; }

  .offer-table { border-collapse: collapse; width: 100%; table-layout: fixed; font-size: 11.5px; }
  .offer-table th, .offer-table td {
    border-bottom: 1px solid var(--border); padding: 9px 12px; text-align: left;
    overflow-wrap: break-word; vertical-align: top; line-height: 1.45;
  }
  .offer-table th {
    background: var(--bg); font-weight: 700; color: var(--muted); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.03em; border-top: 1px solid var(--border);
  }
  .offer-table tbody tr:nth-child(even) td { background: rgba(120,120,140,0.045); }
  .offer-table tbody tr:hover td { background: rgba(79,70,229,0.06); }
  .offer-table td:first-child { font-weight: 600; }
  .pending { color: var(--muted); font-style: italic; }
  .offer-form { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
  .offer-form input { padding: 6px 8px; font-size: 11.5px; }
  .offer-form button { padding: 6px 10px; font-size: 11.5px; }
  .offer-sent-summary { font-size: 11.5px; line-height: 1.6; }
  .offer-sent-summary .sent-badge { color: #16a34a; font-weight: 700; }
</style>

<script src="lib/supabase-client.js"></script>
<script src="lib/auth-guard.js"></script>
<script src="lib/sidebar.js"></script>
<script src="lib/company-styles.js"></script>
<script>
const main = document.getElementById('main-content');
const pageSubtitle = document.getElementById('page-subtitle');
let allCandidates = [];
let allCompanies = [];

function groupBy(items, keyFn) {
  const map = new Map();
  for (const item of items) {
    const key = keyFn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

function companyOf(candidate) {
  return candidate.recruitment_requests?.companies?.name || candidate.manual_folders?.companies?.name || 'Unassigned';
}

function designationOf(candidate) {
  return candidate.recruitment_requests?.designation || candidate.manual_folders?.designation || (candidate.source_subject || candidate.full_name || 'Unknown');
}

function renderCrumbs(parts) {
  return `<div class="crumb-nav">${parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    return isLast ? `<span>${p.label}</span>` : `<a data-nav="${p.nav}">${p.label}</a><span>›</span>`;
  }).join('')}</div>`;
}

function cell(value, pendingLabel) {
  if (value) return value;
  return `<span class="pending">${pendingLabel || '—'}</span>`;
}

function renderCompanyList() {
  pageSubtitle.textContent = 'Choose a company to see candidates ready for an offer.';
  const groups = groupBy(allCandidates, companyOf);
  const names = allCompanies.map((c) => c.name);
  if (groups.has('Unassigned')) names.push('Unassigned');

  main.innerHTML = `
    <div class="tile-grid">
      ${names.map((name) => {
        const count = (groups.get(name) || []).length;
        const s = companyStyleFor(name);
        return `
          <div class="tile" data-company="${encodeURIComponent(name)}" style="background:${s.bg};border-color:${s.border};color:${s.text}">
            ${s.logo ? `<img class="tile-logo" src="${s.logo}" alt="${name}" />` : `<div class="tile-icon">📋</div>`}
            <div class="tile-name">${name}</div>
            <div class="tile-count">${count} ready for offer</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  main.querySelectorAll('.tile[data-company]').forEach((tile) => {
    tile.addEventListener('click', () => renderDesignationList(decodeURIComponent(tile.dataset.company), groups.get(decodeURIComponent(tile.dataset.company)) || []));
  });
}

function renderDesignationList(companyName, companyCandidates) {
  pageSubtitle.textContent = `${companyName} · choose a position.`;
  const s = companyStyleFor(companyName);
  const groups = groupBy(companyCandidates, designationOf);

  main.innerHTML = `
    ${renderCrumbs([{ label: 'Companies', nav: 'companies' }, { label: companyName }])}
    ${groups.size ? `
      <div class="tile-grid">
        ${Array.from(groups.entries()).map(([designation, items]) => `
          <div class="tile" data-designation="${encodeURIComponent(designation)}" style="background:${s.bg};border-color:${s.border};color:${s.text}">
            <div class="tile-icon">📄</div>
            <div class="tile-name">${designation}</div>
            <div class="tile-count">${items.length} ready for offer</div>
          </div>
        `).join('')}
      </div>
    ` : '<p class="kpi-note">No one ready for an offer for this company yet.</p>'}
  `;

  main.querySelectorAll('[data-nav="companies"]').forEach((el) => el.addEventListener('click', renderCompanyList));
  main.querySelectorAll('.tile[data-designation]').forEach((tile) => {
    const designation = decodeURIComponent(tile.dataset.designation);
    tile.addEventListener('click', () => renderOfferTable(companyName, designation, groups.get(designation) || []));
  });
}

function latestOffer(candidate) {
  const list = candidate.offers || [];
  if (!list.length) return null;
  return list.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
}

function renderOfferCell(candidate) {
  const offer = latestOffer(candidate);
  if (offer && offer.sent_at) {
    return `
      <div class="offer-sent-summary">
        <div class="sent-badge">✅ Offer Sent</div>
        Salary: ${offer.salary || '—'}<br>
        Joining: ${offer.joining_date || '—'}<br>
        Sent: ${new Date(offer.sent_at).toLocaleDateString()}
      </div>
    `;
  }
  return `
    <div class="offer-form">
      <input type="text" class="offer-salary" placeholder="Salary (e.g. LKR 180,000)" />
      <input type="date" class="offer-joining-date" />
      <input type="text" class="offer-benefits" placeholder="Benefits (optional)" />
      <input type="text" class="offer-notice" placeholder="Notice Period (optional)" />
      <input type="text" class="offer-probation" placeholder="Probation (optional)" />
      <button class="btn-primary send-offer-btn">Send Offer Letter</button>
    </div>
  `;
}

function renderOfferRow(candidate, companyName, designation) {
  return `
    <tr data-id="${candidate.id}">
      <td>${candidate.full_name || candidate.email}</td>
      <td>${cell(candidate.phone)}</td>
      <td>${cell(candidate.email)}</td>
      <td>${renderOfferCell(candidate)}</td>
    </tr>
  `;
}

function bindOfferRow(candidate, companyName, designation) {
  const row = main.querySelector(`tr[data-id="${candidate.id}"]`);
  if (!row) return;

  const sendBtn = row.querySelector('.send-offer-btn');
  if (!sendBtn) return;

  sendBtn.addEventListener('click', async () => {
    const salary = row.querySelector('.offer-salary').value.trim();
    const joiningDate = row.querySelector('.offer-joining-date').value;
    const benefits = row.querySelector('.offer-benefits').value.trim();
    const noticePeriod = row.querySelector('.offer-notice').value.trim();
    const probation = row.querySelector('.offer-probation').value.trim();

    if (!salary || !joiningDate) {
      alert('Salary and Joining Date are required.');
      return;
    }
    if (!candidate.email) {
      alert('This candidate has no email on file.');
      return;
    }

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span>Sending…';
    try {
      const res = await fetch('/.netlify/functions/send-offer-letter', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          candidateEmail: candidate.email,
          candidateName: candidate.full_name,
          designation,
          companyName,
          salary,
          joiningDate,
          benefits,
          noticePeriod,
          probation,
        }),
      });
      const payload = await res.json();
      if (!res.ok) throw new Error(payload.error || 'Sending offer letter failed');

      const sentAt = new Date().toISOString();
      const { error } = await sb.from('offers').insert({
        candidate_id: candidate.id,
        designation,
        salary,
        joining_date: joiningDate,
        benefits: benefits || null,
        notice_period: noticePeriod || null,
        probation: probation || null,
        sent_at: sentAt,
      });
      if (error) throw error;

      candidate.offers = [{ salary, joining_date: joiningDate, sent_at: sentAt, created_at: sentAt }];
      row.outerHTML = renderOfferRow(candidate, companyName, designation);
      bindOfferRow(candidate, companyName, designation);
    } catch (err) {
      alert(err.message);
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send Offer Letter';
    }
  });
}

function renderOfferTable(companyName, designation, candidates) {
  pageSubtitle.textContent = `${companyName} · ${designation}`;

  main.innerHTML = `
    ${renderCrumbs([
      { label: 'Companies', nav: 'companies' },
      { label: companyName, nav: 'company', company: companyName },
      { label: designation },
    ])}
    <h2 style="margin:0 0 14px">${designation}</h2>
    ${candidates.length ? `
      <section class="panel">
        <table class="offer-table">
          <thead>
            <tr>
              <th>Candidate</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Offer Letter</th>
            </tr>
          </thead>
          <tbody>
            ${candidates.map((c) => renderOfferRow(c, companyName, designation)).join('')}
          </tbody>
        </table>
      </section>
    ` : '<p class="kpi-note">No one ready for an offer for this position yet.</p>'}
  `;

  main.querySelectorAll('[data-nav="companies"]').forEach((el) => el.addEventListener('click', renderCompanyList));
  const companyCrumb = main.querySelector('[data-nav="company"]');
  if (companyCrumb) {
    companyCrumb.addEventListener('click', () => {
      const companyCandidates = allCandidates.filter((c) => companyOf(c) === companyName);
      renderDesignationList(companyName, companyCandidates);
    });
  }
  candidates.forEach((c) => bindOfferRow(c, companyName, designation));
}

async function loadOffers() {
  const [companiesRes, candidatesRes] = await Promise.all([
    sb.from('companies').select('id, name').order('name'),
    sb
      .from('candidates')
      .select('id, full_name, email, phone, recruitment_requests(designation, companies(name)), manual_folders(designation, companies(name)), offers(salary, joining_date, sent_at, created_at)')
      .eq('offer_selection', 'selected')
      .order('applied_at', { ascending: false }),
  ]);

  if (companiesRes.error) {
    main.innerHTML = `<div class="status error">${companiesRes.error.message}</div>`;
    return;
  }
  if (candidatesRes.error) {
    main.innerHTML = `<div class="status error">${candidatesRes.error.message}</div>`;
    return;
  }

  allCompanies = companiesRes.data;
  allCandidates = candidatesRes.data;

  if (!allCandidates.length) {
    main.innerHTML = '<p class="kpi-note">No one ready for an offer yet — mark someone "Selected" under Selected for Offer? in the Interview tab.</p>';
    return;
  }

  renderCompanyList();
}

window.authReady.then((profile) => {
  if (!profile) return;
  renderSidebar('offer-letter.html');
  if (!['hr', 'admin'].includes(profile.role)) {
    main.innerHTML = '<p class="kpi-note">You do not have access to this page.</p>';
    return;
  }
  loadOffers();
});
</script>

</body>
</html>
