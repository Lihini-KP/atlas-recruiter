<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<script>(function(){var t=localStorage.getItem('atlas-theme');if(t)document.documentElement.dataset.theme=t;})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Self Assessment — ATLAS Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="brand">
    <h1>Self Assessment</h1>
    <p id="position-line">Congratulations on being shortlisted — a few more details before we move to interview.</p>
  </div>
</header>

<main>
  <section class="panel" id="form-panel">
    <h2>Tell us about your knowledge and experience</h2>
    <form id="assessment-form">
      <div class="grid">
        <div class="field"><label>Candidate Name *</label><input name="candidateName" required /></div>
        <div class="field"><label>Email *</label><input name="candidateEmail" type="email" required /></div>
        <div class="field full"><label>Position Applied For *</label><input name="position" required /></div>

        <div class="field"><label>Years of relevant experience *</label><input name="yearsExperience" placeholder="e.g. 3 years" required /></div>
        <div class="field full">
          <label>Describe your relevant work experience and key responsibilities *</label>
          <textarea name="workExperience" rows="4" required></textarea>
        </div>
        <div class="field full">
          <label>What knowledge, skills, or expertise do you have relevant to this position? *</label>
          <textarea name="relevantSkills" rows="4" required></textarea>
        </div>
        <div class="field full">
          <label>Any relevant certifications, training, or qualifications?</label>
          <textarea name="certifications" rows="2"></textarea>
        </div>
        <div class="field full">
          <label>Describe a specific achievement or challenge you handled in a similar role *</label>
          <textarea name="achievement" rows="4" required></textarea>
        </div>
        <div class="field full">
          <label>Why do you think you are a good fit for this position? *</label>
          <textarea name="whyFit" rows="4" required></textarea>
        </div>
      </div>
      <div class="actions">
        <button type="submit" class="btn-primary" id="submit-btn">Submit Self Assessment</button>
      </div>
      <div class="status hidden" id="submit-status"></div>
    </form>
  </section>

  <section class="panel hidden" id="done-panel">
    <h2>Thank you</h2>
    <p>Your self assessment has been received. Our HR Department will be in touch about the next step.</p>
  </section>
</main>

<script>
const form = document.getElementById('assessment-form');
const submitBtn = document.getElementById('submit-btn');
const submitStatus = document.getElementById('submit-status');
const formPanel = document.getElementById('form-panel');
const donePanel = document.getElementById('done-panel');
const positionLine = document.getElementById('position-line');

// Pre-fill from a link like self-assessment.html?position=Marketing+Executive&name=John+Silva&email=john@example.com
const params = new URLSearchParams(location.search);
if (params.get('position')) {
  form.position.value = params.get('position');
  positionLine.textContent = `Applying for: ${params.get('position')}`;
}
if (params.get('name')) form.candidateName.value = params.get('name');
if (params.get('email')) form.candidateEmail.value = params.get('email');

function setStatus(el, message, type) {
  el.textContent = message;
  el.className = 'status' + (type ? ' ' + type : '');
  el.classList.remove('hidden');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form).entries());
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';
  submitStatus.classList.add('hidden');

  try {
    const res = await fetch('/.netlify/functions/submit-self-assessment', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(data),
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || 'Failed to submit self assessment');

    formPanel.classList.add('hidden');
    donePanel.classList.remove('hidden');
  } catch (err) {
    setStatus(submitStatus, err.message, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Self Assessment';
  }
});
</script>

</body>
</html>
